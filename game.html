<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="game.css">
<link rel="stylesheet" href="embed.css">
<script src="embed.js"></script>

</head>

<body class="page-game">

<header class="header">

    <nav class="nav">
        <a href="all-pages.html#home">Главная</a>
        <a href="all-pages.html#events">События</a>
        <a href="all-pages.html#menu">Меню</a>
        <a href="all-pages.html#merch">Мерч</a>
        <a href="all-pages.html#minigame" class="active">Пошалим</a>
        <a href="all-pages.html#contacts">Контакты</a>
    </nav>

</header>

<div class="cart-float">
    <a href="all-pages.html#korzina" aria-label="Корзина"><img src="korzina.png" alt=""></a>
</div>

<main class="page">

    <!-- холст -->
    <canvas id="canvas"></canvas>

    <!-- панель -->
    <div class="tools">

        <!-- цвета -->
        <button class="color-btn active-color"
                data-color="#E0E1DD">
            <img src="color1.png">
        </button>

        <button class="color-btn"
                data-color="#778DA9">
            <img src="color2.png">
        </button>

        <button class="color-btn"
                data-color="#1B263B">
            <img src="color3.png">
        </button>

        <button class="color-btn"
                data-color="#0D1B2A">
            <img src="color4.png">
        </button>

        <!-- отмена -->
        <button id="undo">
            <img src="strelka1.png">
        </button>

        <!-- вернуть -->
        <button id="redo">
            <img src="strelka2.png">
        </button>

    </div>

</main>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 58;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let drawing = false;

let currentColor = "#E0E1DD";

const history = [];
const redoHistory = [];

ctx.lineWidth = 20;
ctx.lineCap = "round";


// РИСОВАНИЕ
canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stopDraw);

function pointerPos(e) {
    var rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function startDraw(e) {
    drawing = true;
    var p = pointerPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
}

function draw(e) {
    if (!drawing) return;
    var p = pointerPos(e);
    ctx.strokeStyle = currentColor;
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
}

function stopDraw() {

    if(!drawing) return;

    drawing = false;

    saveState();

}


// СОХРАНЕНИЕ ИСТОРИИ
function saveState() {

    if(history.length >= 5){
        history.shift();
    }

    history.push(canvas.toDataURL());

}


// ОТМЕНА
document.getElementById("undo")
.addEventListener("click", ()=>{

    if(history.length === 0) return;

    redoHistory.push(canvas.toDataURL());

    const img = new Image();

    history.pop();

    const last =
    history[history.length - 1];

    if(!last){

        ctx.clearRect(0,0,
        canvas.width,
        canvas.height);

        return;
    }

    img.src = last;

    img.onload = ()=>{
        ctx.clearRect(0,0,
        canvas.width,
        canvas.height);

        ctx.drawImage(img,0,0);
    };

});


// ВЕРНУТЬ
document.getElementById("redo")
.addEventListener("click", ()=>{

    if(redoHistory.length === 0) return;

    const state = redoHistory.pop();

    history.push(state);

    const img = new Image();

    img.src = state;

    img.onload = ()=>{
        ctx.clearRect(0,0,
        canvas.width,
        canvas.height);

        ctx.drawImage(img,0,0);
    };

});


// ЦВЕТА
const colorBtns =
document.querySelectorAll(".color-btn");

colorBtns.forEach(btn=>{

    btn.addEventListener("click", ()=>{

        colorBtns.forEach(b=>{
            b.classList.remove("active-color");
        });

        btn.classList.add("active-color");

        currentColor =
        btn.dataset.color;

    });

});

</script>

</body>
</html>
