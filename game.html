<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="game.css">
<link rel="stylesheet" href="embed.css">
<script src="embed.js"></script>
<script src="graffiti-spray.js"></script>

</head>

<body class="page-game">

<header class="header">

    <nav class="nav">
        <a href="all-pages.html#home">Главная</a>
        <a href="all-pages.html#events">События</a>
        <a href="all-pages.html#menu">Меню</a>
        <a href="all-pages.html#merch">Мерч</a>
        <a href="all-pages.html#minigame" class="active">Пошалим</a>
        <a href="all-pages.html#contacts">Контакты</a>
    </nav>

</header>

<div class="cart-float">
    <a href="all-pages.html#korzina" aria-label="Корзина"><img src="korzina.png" alt=""></a>
</div>

<main class="page">

    <!-- холст -->
    <canvas id="canvas"></canvas>

    <!-- панель -->
    <div class="tools">

        <!-- цвета -->
        <button type="button" class="color-btn active-color"
                data-color="#E0E1DD"
                aria-label="Светлая краска">
            <img src="color1.png" alt="">
        </button>

        <button type="button" class="color-btn"
                data-color="#778DA9"
                aria-label="Серая краска">
            <img src="color2.png" alt="">
        </button>

        <button type="button" class="color-btn"
                data-color="#1B263B"
                aria-label="Тёмно-синяя краска">
            <img src="color3.png" alt="">
        </button>

        <button type="button" class="color-btn"
                data-color="#0D1B2A"
                aria-label="Чёрно-синяя краска">
            <img src="color4.png" alt="">
        </button>

        <!-- отмена -->
        <button id="undo">
            <img src="strelka1.png">
        </button>

        <!-- вернуть -->
        <button id="redo">
            <img src="strelka2.png">
        </button>

    </div>

</main>

<footer class="footer">
    <div class="footer-left">
        <p>8-910-123-45-67</p>
        <p>8-777-777-77-77</p>
    </div>
    <div class="footer-center">
        <p>@homie_iv</p>
        <p>your_homie</p>
    </div>
    <img src="logo.png" class="footer-logo" alt="Homie">
</footer>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const HEADER_H = 58;
const FOOTER_H = 170;

function chromeHeight() {
    if (document.documentElement.classList.contains("is-embed")) return 0;
    return HEADER_H + FOOTER_H;
}

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - chromeHeight();
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let drawing = false;

let currentColor = "#E0E1DD";

const history = [];
const redoHistory = [];

// РИСОВАНИЕ (баллончик — пушистый спрей)
canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stopDraw);
canvas.addEventListener("mouseleave", stopDraw);

canvas.addEventListener("touchstart", startDraw, { passive: false });
canvas.addEventListener("touchmove", draw, { passive: false });
canvas.addEventListener("touchend", stopDraw);

function pointerPos(e) {
    var rect = canvas.getBoundingClientRect();
    var clientX = e.clientX;
    var clientY = e.clientY;
    if (e.touches && e.touches.length) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    }
    return { x: clientX - rect.left, y: clientY - rect.top };
}

function startDraw(e) {
    if (e.cancelable) e.preventDefault();
    drawing = true;
    var p = pointerPos(e);
    sprayPaint.sprayAt(ctx, p.x, p.y, currentColor);
}

function draw(e) {
    if (!drawing) return;
    if (e.cancelable) e.preventDefault();
    var p = pointerPos(e);
    sprayPaint.sprayAt(ctx, p.x, p.y, currentColor);
}

function stopDraw() {
    if (!drawing) return;
    drawing = false;
    saveState();
}


// СОХРАНЕНИЕ ИСТОРИИ
function saveState() {

    if(history.length >= 5){
        history.shift();
    }

    history.push(canvas.toDataURL());

}


// ОТМЕНА
document.getElementById("undo")
.addEventListener("click", ()=>{

    if(history.length === 0) return;

    redoHistory.push(canvas.toDataURL());

    const img = new Image();

    history.pop();

    const last =
    history[history.length - 1];

    if(!last){

        ctx.clearRect(0,0,
        canvas.width,
        canvas.height);

        return;
    }

    img.src = last;

    img.onload = ()=>{
        ctx.clearRect(0,0,
        canvas.width,
        canvas.height);

        ctx.drawImage(img,0,0);
    };

});


// ВЕРНУТЬ
document.getElementById("redo")
.addEventListener("click", ()=>{

    if(redoHistory.length === 0) return;

    const state = redoHistory.pop();

    history.push(state);

    const img = new Image();

    img.src = state;

    img.onload = ()=>{
        ctx.clearRect(0,0,
        canvas.width,
        canvas.height);

        ctx.drawImage(img,0,0);
    };

});


// ЦВЕТА
const colorBtns =
document.querySelectorAll(".color-btn");

colorBtns.forEach(btn=>{

    btn.addEventListener("click", ()=>{

        colorBtns.forEach(b=>{
            b.classList.remove("active-color");
        });

        btn.classList.add("active-color");

        currentColor =
        btn.dataset.color;

    });

});

</script>

</body>
</html>
