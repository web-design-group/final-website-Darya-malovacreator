<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Корзина — Homie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="korzina.css">
    <link rel="stylesheet" href="embed.css">
    <link rel="stylesheet" href="modals.css">
    <script src="embed.js"></script>
</head>
<body>

<header class="header">
    <nav class="nav">
        <a href="all-pages.html#home">Главная</a>
        <a href="all-pages.html#events">События</a>
        <a href="all-pages.html#menu">Меню</a>
        <a href="all-pages.html#merch">Мерч</a>
        <a href="all-pages.html#minigame">Пошалим</a>
        <a href="all-pages.html#contacts">Контакты</a>
    </nav>
</header>

<div class="cart-float">
    <a href="all-pages.html#korzina" aria-label="Корзина"><img src="korzina.png" alt=""></a>
</div>

<main class="page-main">
    <h1 class="page-title">КОРЗИНА</h1>

    <div class="cart-panel">
        <div id="cartEmpty" class="empty-state" hidden>
            Пока пусто. Загляни в <a href="all-pages.html#menu">меню</a> или <a href="all-pages.html#merch">мерч</a>, чтобы добавить позиции.
        </div>
        <table class="cart-table" id="cartTable" hidden>
            <tbody id="cartBody"></tbody>
        </table>
        <div class="total-bar" id="cartTotalWrap" hidden>
            <span>Итого</span>
            <strong><span id="cartTotal">0</span> ₽</strong>
            <button type="button" class="checkout-btn" id="checkoutBtn">Оформить (демо)</button>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="footer-left">
        <div class="text-block">
            <p>8-777-777-77-77</p>
            <p>tvoyhomie@gmail.com</p>
        </div>
    </div>
    <div class="footer-center">
        <div class="footer-item">
            <img src="TG-black.png" alt="">
            <span>your_homie</span>
        </div>
        <div class="footer-item">
            <img src="VK-black.png" alt="">
            <span>tvoyhomie</span>
        </div>
    </div>
    <div class="footer-right">
        <img src="logo.png" alt="Homie">
    </div>
</footer>

<script>
(function () {
    const KEY = "homieCart";

    function read() {
        try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; }
    }

    function write(arr) {
        localStorage.setItem(KEY, JSON.stringify(arr));
    }

    function money(n) {
        return Math.round(n).toLocaleString("ru-RU");
    }

    const cartBody = document.getElementById("cartBody");
    const cartTable = document.getElementById("cartTable");
    const cartEmpty = document.getElementById("cartEmpty");
    const cartTotalWrap = document.getElementById("cartTotalWrap");
    const cartTotal = document.getElementById("cartTotal");
    const checkoutBtn = document.getElementById("checkoutBtn");

    function render() {
        let cart = read();
        cartBody.innerHTML = "";
        if (!cart.length) {
            cartEmpty.hidden = false;
            cartTable.hidden = true;
            cartTotalWrap.hidden = true;
            return;
        }
        cartEmpty.hidden = true;
        cartTable.hidden = false;
        cartTotalWrap.hidden = false;

        let sum = 0;
        cart.forEach(function (item, index) {
            const line = item.price * item.qty;
            sum += line;

            const tr = document.createElement("tr");
            tr.className = "cart-row";
            tr.innerHTML =
                "<td class=\"item-name\">" + item.name +
                "</td><td><span class=\"item-price\">" + money(item.price) + " ₽</span></td>" +
                "<td>" +
                "<span class=\"qty-box\">" +
                "<button type=\"button\" data-act=\"minus\" data-i=\"" + index + "\">−</button>" +
                "<span class=\"qty-num\">" + item.qty + "</span>" +
                "<button type=\"button\" data-act=\"plus\" data-i=\"" + index + "\">+</button>" +
                "</span></td>" +
                "<td class=\"item-price\">" + money(line) + " ₽</td>";
            cartBody.appendChild(tr);
        });

        cartTotal.textContent = money(sum);

        cartBody.onclick = function (e) {
            const btn = e.target.closest("button[data-act]");
            if (!btn) return;
            const i = Number(btn.dataset.i);
            const act = btn.dataset.act;
            cart = read();
            if (!cart[i]) return;
            if (act === "plus") cart[i].qty += 1;
            else if (act === "minus") cart[i].qty -= 1;
            cart = cart.filter(function (x) { return x.qty > 0; });
            write(cart);
            render();
        };
    }

    window.homieCartRender = render;
    render();
})();
</script>
<script src="modals.js"></script>
</body>
</html>
